# This Secret is managed via AWS Secrets Manager + External Secrets Operator.
# Do NOT store real values here — populate via ESO or kubectl create secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zupikas-secrets
  namespace: zupikas
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: zupikas-secrets
    creationPolicy: Owner
  data:
    - secretKey: BACKEND_KEY
      remoteRef:
        key: LUPIKAS/secrets
        property: BACKEND_KEY
    - secretKey: QUEUE_JOB_KEY
      remoteRef:
        key: LUPIKAS/secrets
        property: QUEUE_JOB_KEY
    - secretKey: TRIGGER_JOB_KEY
      remoteRef:
        key: LUPIKAS/secrets
        property: TRIGGER_JOB_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: zupikas/dev/aurora
        property: DATABASE_URL
