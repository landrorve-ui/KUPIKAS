apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-job
  namespace: zupikas
  labels:
    app: queue-job
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queue-job
  template:
    metadata:
      labels:
        app: queue-job
    spec:
      containers:
        - name: queue-job
          image: 431546822103.dkr.ecr.us-west-1.amazonaws.com/tc-queue-job-dev:latest
          ports:
            - containerPort: 3334
          env:
            - name: PORT
              value: "3334"
            - name: NODE_ENV
              value: "production"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "opentelemetry-collector.monitoring.svc.cluster.local:4317"
            - name: NATS_URL
              value: "nats://nats.zupikas.svc.cluster.local:4222"
          envFrom:
            - secretRef:
                name: zupikas-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3334
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3334
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: queue-job
  namespace: zupikas
spec:
  selector:
    app: queue-job
  ports:
    - port: 3334
      targetPort: 3334
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: queue-job-hpa
  namespace: zupikas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: queue-job
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
