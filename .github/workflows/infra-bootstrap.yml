name: Infrastructure Bootstrap

# Run once to set up the full environment from scratch.
# Prerequisite (one-time manual step):
#   - Create an IAM role trusted by GitHub Actions OIDC and add its ARN
#     as the repository secret AWS_ROLE_TO_ASSUME_DEV.
#   - Add repository variables: AWS_REGION, EKS_CLUSTER (or accept defaults).
on:
  workflow_dispatch:
    inputs:
      create_tf_backend:
        description: "Create S3 + DynamoDB Terraform state backend?"
        required: false
        default: true
        type: boolean
      provision_infra:
        description: "Run terraform apply (VPC, EKS, ECR)?"
        required: false
        default: true
        type: boolean
      apply_k8s_manifests:
        description: "Apply Kubernetes base manifests?"
        required: false
        default: true
        type: boolean
      upsert_secrets:
        description: "Create/update LUPIKAS/secrets in AWS Secrets Manager?"
        required: false
        default: true
        type: boolean

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
  EKS_CLUSTER: ${{ vars.EKS_CLUSTER || 'zupikas-cluster' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'zupikas-terraform-state' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'zupikas-terraform-locks' }}
  K8S_NAMESPACE: zupikas

jobs:
  # -------------------------------------------------------
  # Step 1: Create Terraform remote state backend
  # -------------------------------------------------------
  tf-backend:
    name: "Step 1 — Create Terraform State Backend"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_tf_backend == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket (idempotent)
        run: |
          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Bucket $TF_STATE_BUCKET already exists, skipping."
          else
            aws s3 mb "s3://$TF_STATE_BUCKET" --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

      - name: Create DynamoDB lock table (idempotent)
        run: |
          if aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" 2>/dev/null; then
            echo "Table $TF_LOCK_TABLE already exists, skipping."
          else
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
          fi

  # -------------------------------------------------------
  # Step 2 + 3: Terraform apply → VPC, ECR, EKS
  # -------------------------------------------------------
  provision-infra:
    name: "Step 2 — Terraform Apply"
    runs-on: ubuntu-latest
    needs: tf-backend
    if: |
      always() &&
      (needs.tf-backend.result == 'success' || needs.tf-backend.result == 'skipped') &&
      github.event.inputs.provision_infra == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: terraform/envs/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/envs/dev
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/envs/dev
        run: terraform apply -auto-approve tfplan

  # -------------------------------------------------------
  # Step 4 + 5: Write secrets → Apply k8s manifests
  # -------------------------------------------------------
  upsert-secrets:
    name: "Step 4 — Upsert AWS Secrets Manager secret"
    runs-on: ubuntu-latest
    needs: provision-infra
    if: |
      always() &&
      (needs.provision-infra.result == 'success' || needs.provision-infra.result == 'skipped') &&
      github.event.inputs.upsert_secrets == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or update LUPIKAS/secrets
        env:
          BACKEND_KEY: ${{ secrets.BACKEND_KEY }}
          QUEUE_JOB_KEY: ${{ secrets.QUEUE_JOB_KEY }}
          TRIGGER_JOB_KEY: ${{ secrets.TRIGGER_JOB_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SECRET_VALUE=$(jq -n \
            --arg bk  "$BACKEND_KEY" \
            --arg qjk "$QUEUE_JOB_KEY" \
            --arg tjk "$TRIGGER_JOB_KEY" \
            --arg db  "$DATABASE_URL" \
            '{BACKEND_KEY:$bk, QUEUE_JOB_KEY:$qjk, TRIGGER_JOB_KEY:$tjk, DATABASE_URL:$db}')

          if aws secretsmanager describe-secret --secret-id "LUPIKAS/secrets" 2>/dev/null; then
            aws secretsmanager put-secret-value \
              --secret-id "LUPIKAS/secrets" \
              --secret-string "$SECRET_VALUE"
            echo "Secret updated."
          else
            aws secretsmanager create-secret \
              --name "LUPIKAS/secrets" \
              --region "$AWS_REGION" \
              --secret-string "$SECRET_VALUE"
            echo "Secret created."
          fi

  apply-k8s:
    name: "Step 5 — Apply Kubernetes Manifests"
    runs-on: ubuntu-latest
    needs: [provision-infra, upsert-secrets]
    if: |
      always() &&
      (needs.provision-infra.result == 'success' || needs.provision-infra.result == 'skipped') &&
      (needs.upsert-secrets.result == 'success' || needs.upsert-secrets.result == 'skipped') &&
      github.event.inputs.apply_k8s_manifests == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER"

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/queue-job.yaml
          kubectl apply -f k8s/trigger-job.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for deployments
        run: |
          for deploy in backend queue-job trigger-job; do
            kubectl rollout status deployment/$deploy \
              --namespace=$K8S_NAMESPACE \
              --timeout=300s
          done
