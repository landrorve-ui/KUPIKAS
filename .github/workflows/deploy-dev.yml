name: Build and Deploy to Kubernetes (Dev)

on:
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Run database migration?"
        required: false
        default: true
        type: boolean
      deploy_backend:
        description: "Build and deploy backend?"
        required: false
        default: true
        type: boolean
      deploy_queue_job:
        description: "Build and deploy queue-job?"
        required: false
        default: true
        type: boolean
      deploy_trigger_job:
        description: "Build and deploy trigger-job?"
        required: false
        default: true
        type: boolean

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
  EKS_CLUSTER: ${{ vars.EKS_CLUSTER || 'zupikas-cluster' }}
  K8S_NAMESPACE: zupikas

jobs:
  # -------------------------------------------------------
  # Build images in parallel
  # -------------------------------------------------------
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy_backend == 'true' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push Backend
        id: build
        uses: ./.github/actions/build/docker/aws
        with:
          image-name: "tc-backend-dev"
          dockerfile-path: "docker/Dockerfile.backend"
          context: "."
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          deploy-env: "dev"
          docker-tag: ${{ github.sha }}

  build-queue-job:
    name: Build Queue-Job Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy_queue_job == 'true' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push Queue-Job
        id: build
        uses: ./.github/actions/build/docker/aws
        with:
          image-name: "tc-queue-job-dev"
          dockerfile-path: "docker/Dockerfile.queuejob"
          context: "."
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          deploy-env: "dev"
          docker-tag: ${{ github.sha }}

  build-trigger-job:
    name: Build Trigger-Job Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy_trigger_job == 'true' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push Trigger-Job
        id: build
        uses: ./.github/actions/build/docker/aws
        with:
          image-name: "tc-trigger-job-dev"
          dockerfile-path: "docker/Dockerfile.triggerjob"
          context: "."
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          deploy-env: "dev"
          docker-tag: ${{ github.sha }}

  build-migration:
    name: Build Migration Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.run_migration == 'true' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push Migration
        id: build
        uses: ./.github/actions/build/docker/aws
        with:
          image-name: "tc-migration-dev"
          dockerfile-path: "docker/Dockerfile.migration"
          context: "."
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          deploy-env: "dev"
          docker-tag: ${{ github.sha }}

  # -------------------------------------------------------
  # Run DB migration (after build, before app deploy)
  # -------------------------------------------------------
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    needs: build-migration
    if: ${{ github.event_name == 'push' || github.event.inputs.run_migration == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Run migration Job
        run: |
          kubectl create job migration-${{ github.sha }} \
            --image=${{ needs.build-migration.outputs.image-uri }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            -- npx prisma migrate deploy --config=libs/sharedb/prisma.config.ts

          kubectl wait job/migration-${{ github.sha }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --for=condition=complete \
            --timeout=120s

          kubectl delete job migration-${{ github.sha }} \
            --namespace=${{ env.K8S_NAMESPACE }}

  # -------------------------------------------------------
  # Deploy services to EKS (after migration)
  # -------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to EKS
    runs-on: ubuntu-latest
    needs: [build-backend, migrate]
    if: |
      always() &&
      needs.build-backend.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy Backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ needs.build-backend.outputs.image-uri }} \
            --namespace=${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/backend \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s

  deploy-queue-job:
    name: Deploy Queue-Job to EKS
    runs-on: ubuntu-latest
    needs: [build-queue-job, migrate]
    if: |
      always() &&
      needs.build-queue-job.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy Queue-Job
        run: |
          kubectl set image deployment/queue-job \
            queue-job=${{ needs.build-queue-job.outputs.image-uri }} \
            --namespace=${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/queue-job \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s

  deploy-trigger-job:
    name: Deploy Trigger-Job to EKS
    runs-on: ubuntu-latest
    needs: [build-trigger-job, migrate]
    if: |
      always() &&
      needs.build-trigger-job.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy Trigger-Job
        run: |
          kubectl set image deployment/trigger-job \
            trigger-job=${{ needs.build-trigger-job.outputs.image-uri }} \
            --namespace=${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/trigger-job \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s
